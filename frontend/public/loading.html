<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clariti</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e4e4f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: #6366f1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      color: #fff;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a3a;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .status {
      font-size: 13px;
      color: #6b6b8a;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">
      <!-- Flask / beaker icon matching the app -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3h6M9 3v7l-5 9a1 1 0 0 0 .9 1.5h14.2A1 1 0 0 0 20 19l-5-9V3"/>
        <line x1="6.1" y1="15" x2="17.9" y2="15"/>
      </svg>
    </div>
    <span class="logo-name">Clariti</span>
  </div>

  <div class="spinner"></div>
  <p class="status">Starting up…</p>
</body>
</html>
